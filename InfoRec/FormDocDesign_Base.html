<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>文件內容設計－公用區｜InfoRec</title>
  <link rel="stylesheet" href="../css/site.css">

  <script src="../js/redirect.js"></script>
  <script src="../js/page-note.js"></script>
</head>

<body class="ir-page">

  <h1>文件內容設計－公用區</h1>
  <hr>

  <p>調整紀錄元件的大小及名稱，字串類型項目的的範例內容。</p>

  <ol class="ol-l1">
    <li>紀錄元件縮放：
      <ul class="ul-l1">
        <li>調整大小：元件項目可以使用滑鼠直接拖拉大小。</li>
        <li>自動縮放：開啟自動縮放，字串元件會變成一行，圖型元件會呈現其原始大小。</li>    
      </ul>
    </li>

    <li>縮放：可放大文件及紀錄元件的視覺大小，以便利設計進行。</li>
    <li>元件名稱：系統自動命名，無法修改。</li>
    <li>顯示名稱：可由使用者命名，便於文件設定過程中的元件辦識。</li>
    <li>內容範例：輸入模擬資料，便於檢視、設計。</li>
    <li>長度 3：自動計算內容範例字串長度。</li>
  </ol>

  <figure>
    <img class="winimg" src="images/FormDocDesign_Base.png" alt="公用區設定">
    <figcaption class="TACenter">公用區</figcaption>
  </figure>

</body>
</html>
