<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>輸入列印區域｜InfoRec</title>
  <link rel="stylesheet" href="../css/site.css">
  <script src="../js/redirect.js"></script>
  <script src="../js/page-note.js"></script>
</head>
<body class="ir-page">

  <h1>輸入列印區域</h1>
  <hr>

  <p class="ir-lead">
    這個區域可以輸入資料、列印、預覽列印以及將資料儲存為紀錄。
  </p>

  <figure id="fig-architecture-io">
    <img class="winimg" src="images/Architecture_IO.png" alt="輸入列印區域視窗">
    <figcaption>輸入列印區域視窗</figcaption>
  </figure>

  <footer id="footerBlock" class="ir-footer">©<span id="siteYear"></span>&nbsp;InfoRec專案原創著作權人所有。</footer>

  <script>
    (function() {
      // 系統安全高度通知與動態防禦機制
      function notifyHeight() {
        if (window.parent && window.parent.postMessage) {
          window.parent.postMessage({ frameHeight: document.body.scrollHeight }, '*');
        }
      }
      window.addEventListener('load', notifyHeight);
      window.addEventListener('resize', notifyHeight);
      
      // 年份自動更新
      var yearEl = document.getElementById('siteYear');
      if (yearEl) {
        yearEl.textContent = new Date().getFullYear();
      }
    })();
  </script>
</body>
</html>
