  <body class="ir-page">
    <h1>紀錄</h1>
    <hr />

    <p class="ir-lead">
      文件必須要有編號（如支票、統一發票），如果文件本身沒有編號，也可以自訂編號。本功能套印後的資料可以保留並以文件編號進行管理，可供日後查詢或分析管理。
    </p>

    <ol class="ol-l1">
      <li>
        <strong>前置作業</strong>
        <ul class="ul-l1">
          <li>
            <a href="FormDocInfo.html" target="content">文件管理：</a>文件管理
            &gt; 進階設定 &gt; 功能設定的「文件領用登錄」需要選取。
          </li>
          <li>
            <a href="FormInfoRecSaveSet.html" target="content"
              >文件紀錄儲存設定：</a
            >設定文件上面的紀錄與資料表的對應關係。
          </li>
        </ul>
      </li>

      <li>
        <strong>紀錄管理</strong>
        <ul class="ul-l1">
          <li>
            <a href="FormDocIssLog.html" target="content">文件領用登錄：</a
            >將文件編號進行登錄，當輸入文件資料時，系統依設定將輸入(套印)資料寫入指定的文件編號，有利於後續分析管理。
          </li>
          <li>
            <a href="FormDocRecords.html" target="content">文件記錄管理：</a
            >可對文件紀錄進行查詢分析、產生報表以、套印領款簽收單..等記錄管理作業。
          </li>
        </ul>
      </li>
    </ol>
  </body>
</html>
