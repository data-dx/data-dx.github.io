  <body class="ir-page">
    <h1>文件領用登錄</h1>
    <hr />

    <p>
      供支票、發票或訂有編號的文件進行領用登錄，當文件紀錄存檔（列印）後，可依編號紀錄內容進行查詢。
    </p>

    <h2>文件編號</h2>
    <ol class="ol-l1">
      <li>有編號文件：如支票、發票等文件，本身有印刷唯一的編號。</li>
      <li>無編號文件：請以自訂編號的方式對文件進行編號。</li>
    </ol>

    <h2>領用登錄流程</h2>
    <ol class="ol-l1">
      <li>將領取的文件（如支票）先行編號登錄，使文件列印紀錄可依編號存檔。</li>
      <li>
        領用登錄：（以一本支票或發票為例）
        <ul class="ul-l1">
          <li>編號起號：輸入首張編號。</li>
          <li>張數：一本的張數。</li>
          <li>編號迄號：系統會自動推算出最後的文件編號。</li>
        </ul>
      </li>
      <li>
        登錄完成後，系統將依文件編號創建空白的紀錄，屬性預設為「未使用」。
      </li>
    </ol>

    <figure>
      <img
        class="winimg"
        src="images/FormDocIssLog.png"
        alt="文件領用登錄管理視窗"
      />

    </figure>
  </body>
