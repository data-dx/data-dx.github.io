<!DOCTYPE html>

<head>
    <title>資料</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link rel="stylesheet" href="../css/maindiv.css">

<body>
    <h1>資料</h1>
    <hr>

    <P>資料：管理套印用於輸入的相關資料。</P>
    <ol>
        <li><a>基本資料：</a>管理使用者公司(機機)的基本資料，例如：帳號、地址．．．等。</li>
        <li><a>客戶管理：</a>使用者以外的相對人員管理。例如支票收票人、匯款單、郵局劃撥單的收款人、信件的收信人...等資料。</li>
        <li><a>物品管理：</a>管理物品資料，以提昇輸入效率。例如：手開式發票(二聯式、三聯式)的品名、會計科目。
        </li>
        <li><a>資料引用：</a>提供資料匯入或匯出的功能，例如：將「客戶資料」匯入系統。</li>
    </ol>

</body>

</html>
