    .ir-page figure {
      display: flex;
      flex-direction: column;

      justify-content: center;
      width: 100%;
      margin: 1.5rem auto;
    }

    /* 限制 Mermaid 的最大寬度，並確保在小螢幕時也能置中縮放 */
    .mermaid {
      width: 100%;
      max-width: 800px;         /* 配合內容區美學的最佳寬度 */
      display: flex;
      justify-content: center;
    }

    /* 🎯 互動式超連結美學（直接覆蓋內建圖表樣式） */
    .mermaid .clickable .label,
    .mermaid .clickable .label span {
      color: #4fc1ff !important;            /* 清晰的互動連結藍 */
      text-decoration: underline !important; /* 畫上標準超連結底線 */
      font-weight: bold;
    }
    
    .architecture-list {
      padding-left: 0;
      list-style-position: inside;
    }
    .architecture-diagram-section {
      width: 100%;
      padding-left: 0;
      list-style-type: none; /* 移除包覆圖表的圓點，維持視覺乾淨 */
    }
  </style>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    
    function initAndRun() {
      mermaid.initialize({ 
        startOnLoad: true,
        theme: 'dark',               /* 圖表核心維持深色，確保跨主題清晰度 */
        themeVariables: {
          fontSize: '15px',
          fontFamily: '"Microsoft JhengHei", sans-serif',
          mainBkg: '#2d323f',         /* 方塊背景：深灰藍 */
          nodeBorder: '#5c677d',      /* 方塊邊框：中灰藍 */
          nodeTextColor: '#e2e8f0',   /* 方塊文字：柔白 */
          lineColor: '#94a3b8',       /* 線條顏色：鋼鐵灰 */
          textColor: '#e2e8f0'        /* 一般文字顏色 */
        }
      });
      // 💡 關鍵防呆：強制主動去掃描網頁中的 pre.mermaid 並畫出來，避免生命週期錯過
      mermaid.run();
    }

    // 確保網頁不論在哪種預覽環境下開好，都能主動出圖
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAndRun);
    } else {
      initAndRun();
    }
  </script>
