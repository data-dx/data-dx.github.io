<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>InfoRec 授權啟動</title>

<style>
body { font-family: system-ui,"Segoe UI",Arial; margin:16px; line-height:1.5; }
.box { border:1px solid #ddd; border-radius:10px; padding:14px; margin:12px 0; }
.warn { background:#fff6e6; border:1px solid #ffd28a; border-radius:8px; padding:12px; }
.ok { background:#ecfff1; border:1px solid #9be6b1; border-radius:8px; padding:12px; }
button { padding:10px 14px; margin:6px 6px 6px 0; }
.mono { font-family: Consolas, monospace; font-size:13px; word-break:break-all; }
.small { font-size:13px; color:#555; }
</style>
</head>

<body>

<h2>InfoRec 授權啟動</h2>

<div class="box">
  <b>Device</b>
  <div id="device" class="mono">-</div>
</div>

<div id="envBox" class="box warn" style="display:none">
  <b>目前瀏覽器不支援錢包連線</b><br>
  請複製此網址，改用「錢包 App 的內建瀏覽器」開啟。
  <div class="small" style="margin-top:8px">
    支援：Phantom / Solflare / Backpack
  </div>
</div>

<div class="box warn">
  <b>安全提示</b><br>
  • Free 啟動只會要求「簽名（Signature）」<br>
  • 不會扣款、不會轉帳、不會存取資產
</div>

<div class="box">
  <button id="btnConnect">連接錢包</button>
  <button id="btnFree" disabled>Free（3 個月）簽名啟動</button>
</div>

<div class="box">
  <b>IR1 授權碼（貼回 InfoRec）</b>
  <textarea id="out" style="width:100%;height:160px" readonly></textarea>
</div>

<div id="msg" class="small"></div>

<script>
/* ---------- 基本工具 ---------- */

const $ = id => document.getElementById(id);
const qs = new URLSearchParams(location.search);
const deviceHash = (qs.get('d') || '').trim();
$('device').textContent = deviceHash || '(未取得)';

function base64Url(bytes){
  let s = '';
  bytes.forEach(b => s += String.fromCharCode(b));
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function msg(t){ $('msg').textContent = t || ''; }

/* ---------- 錢包偵測 ---------- */

function hasWallet(){
  return typeof window.solana !== 'undefined';
}

if(!hasWallet()){
  $('envBox').style.display = 'block';
}

/* ---------- 連線 ---------- */

let provider = null;
let pubkey = null;

$('btnConnect').onclick = async () => {
  try{
    if(!hasWallet())
      throw new Error('請用錢包 App 的內建瀏覽器開啟本頁');

    provider = window.solana;
    const r = await provider.connect();
    pubkey = r.publicKey;
    $('btnFree').disabled = false;
    msg('已連接錢包：' + pubkey.toBase58());
  }catch(e){
    alert(e.message || e);
  }
};

/* ---------- Free 簽名 ---------- */

$('btnFree').onclick = async () => {
  try{
    if(!deviceHash) throw new Error('缺少 DeviceHash');
    if(!pubkey) throw new Error('尚未連接錢包');

    const payload = {
      v:1,
      tier:'FREE',
      device: deviceHash,
      wallet: pubkey.toBase58(),
      ts: Date.now()
    };

    const text = 'IR1|' + JSON.stringify(payload);
    const signed = await provider.signMessage(
      new TextEncoder().encode(text),
      'utf8'
    );

    const ir1 = 'IR1.' + base64Url(
      new TextEncoder().encode(
        JSON.stringify({ p: payload, s: base64Url(Array.from(signed.signature)) })
      )
    );

    $('out').value = ir1;
    msg('完成：請複製 IR1 授權碼貼回 InfoRec');
  }catch(e){
    alert(e.message || e);
  }
};
</script>

</body>
</html>
