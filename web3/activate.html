<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoRec 授權中心</title>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        h2 { text-align: center; margin-bottom: 25px; color: #333; }
        .status-box { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; line-height: 1.5; word-break: break-all; }
        .status-normal { background: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
        .status-error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; display: none; }
        .plan-card { border: 1px solid #e0e0e0; padding: 15px; margin-bottom: 12px; border-radius: 10px; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .plan-card:hover { border-color: #2196f3; background: #f5faff; transform: translateY(-2px); }
        .plan-info b { display: block; font-size: 16px; color: #333; }
        .plan-info span { font-size: 13px; color: #666; }
        .plan-price { font-weight: bold; color: #2196f3; font-size: 18px; }
        button { width: 100%; padding: 12px; border: none; background: #eee; color: #999; border-radius: 8px; font-weight: bold; }
        .active-btn { background: #28a745; color: white; cursor: pointer; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.iife.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.3.9/lib/index.iife.min.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
    <h2>軟體授權與續約 (SKR)</h2>

    <div id="error-box" class="status-box status-error"></div>
    <div id="status" class="status-box status-normal">正在初始化系統...</div>
    
    <div id="plans-container"></div>
</div>

<script>
    // --- 參數設定 ---
    const CONFIG = {
        mint: "SKRbvo6Gf7GondiT3BbTfuRDPqLWei4j2Qy2NPGZhW3",
        receiver: "AWcif9F1t3hYZwyiAKz49ad3MT2H8MSKnURvCgui8e2b",
        rpc: "https://mainnet.helius-rpc.com/?api-key=70163351-a9c1-426b-871d-f8a48b948700", // Helius 穩定節點
        formUrl: "https://docs.google.com/forms/d/e/1FAIpQLSe7qB7Vj7-tL-P2P3y77z2l90-F4F7v5Z-pQWp8_S5bQWp8/formResponse"
    };

    const ENTRIES = {
        device: "entry.318491871", wallet: "entry.1235688536", ir1: "entry.766787688", 
        tx: "entry.465243642", plan: "entry.1350643756"
    };

    const PLANS = [
        { name: "測試方案 A1", skr: 1, days: 30 },
        { name: "測試方案 B", skr: 2, days: 90 },
        { name: "1年保固", skr: 3000, days: 365 },
        { name: "4年延長保固", skr: 3000, days: 1460 },
        { name: "10年專業支援", skr: 10000, days: 3650 }
    ];

    // 全局錯誤攔截
    window.onerror = function(msg, url, line) {
        showError(`系統錯誤: ${msg} (Line ${line})`);
        return false;
    };

    // 顯示錯誤訊息
    function showError(msg) {
        const el = document.getElementById('error-box');
        el.style.display = 'block';
        el.innerHTML = `⚠️ <b>發生錯誤</b><br>${msg}`;
        document.getElementById('status').style.display = 'none';
    }

    // --- 主程式 ---
    window.onload = function() {
        // 1. 檢查庫是否載入
        if (typeof solanaWeb3 === 'undefined') {
            showError("無法連線至區塊鏈核心庫 (solanaWeb3 missing)。<br>您的網路或伺服器可能阻擋了 JSDelivr CDN。<br>建議：請檢查伺服器 CSP 設定或使用 VPN。");
            return;
        }
        if (typeof splToken === 'undefined') {
            showError("無法連線至代幣核心庫 (splToken missing)。");
            return;
        }

        const statusEl = document.getElementById('status');
        const dHash = new URLSearchParams(window.location.search).get('d') || "無設備ID";
        statusEl.innerHTML = `✅ 系統就緒<br>設備 ID: <b>${dHash}</b>`;

        const container = document.getElementById('plans-container');
        PLANS.forEach(p => {
            const div = document.createElement('div');
            div.className = 'plan-card';
            div.innerHTML = `
                <div class="plan-info"><b>${p.name}</b><span>保固: ${p.days} 天</span></div>
                <div class="plan-price">${p.skr} SKR</div>
            `;
            div.onclick = () => processPayment(p, dHash);
            container.appendChild(div);
        });
    };

    async function processPayment(plan, dHash) {
        const statusEl = document.getElementById('status');
        const errEl = document.getElementById('error-box');
        errEl.style.display = 'none';
        statusEl.style.display = 'block';

        try {
            statusEl.innerText = "正在偵測錢包...";
            
            // 偵測 Phantom / Solflare / Standard
            const provider = window.phantom?.solana || window.solflare || window.solana;
            if (!provider) throw new Error("找不到錢包 APP。請務必在 Phantom 或 Solflare 的「內建瀏覽器」中開啟此頁面。");

            if (!provider.isConnected) await provider.connect();
            const walletAddr = provider.publicKey.toString();

            // 連線節點
            statusEl.innerText = "正在建立安全連線...";
            const connection = new solanaWeb3.Connection(CONFIG.rpc, "confirmed");

            // 準備代幣資訊
            const mintPubkey = new solanaWeb3.PublicKey(CONFIG.mint);
            const toPubkey = new solanaWeb3.PublicKey(CONFIG.receiver);
            const fromPubkey = provider.publicKey;

            // 取得 Decimals
            statusEl.innerText = `正在查詢代幣資訊...`;
            const mintInfo = await connection.getParsedAccountInfo(mintPubkey);
            if (!mintInfo.value) throw new Error("找不到 SKR 代幣合約，請確認 Mint 地址正確。");
            const decimals = mintInfo.value.data.parsed.info.decimals;
            const amountBigInt = BigInt(Math.round(plan.skr * Math.pow(10, decimals)));

            // 取得帳戶地址 (ATA)
            statusEl.innerText = "正在計算轉帳路徑...";
            const fromATA = await splToken.getAssociatedTokenAddress(mintPubkey, fromPubkey);
            const toATA = await splToken.getAssociatedTokenAddress(mintPubkey, toPubkey);

            // 檢查餘額 (選擇性，但建議做)
            // const balance = await connection.getTokenAccountBalance(fromATA);
            
            // 建立交易
            const transaction = new solanaWeb3.Transaction().add(
                splToken.createTransferInstruction(
                    fromATA, toATA, fromPubkey, amountBigInt
                )
            );

            transaction.feePayer = fromPubkey;
            const { blockhash } = await connection.getLatestBlockhash();
            transaction.recentBlockhash = blockhash;

            // 發送請求
            statusEl.innerText = "請在錢包中確認支付...";
            const { signature } = await provider.signAndSendTransaction(transaction);
            
            statusEl.innerText = "交易廣播中，請稍候...";
            await connection.confirmTransaction(signature);

            // 成功：產生授權碼
            const exp = new Date();
            exp.setDate(exp.getDate() + plan.days);
            const expStr = `${exp.getFullYear()}/${(exp.getMonth()+1).toString().padStart(2,'0')}/${exp.getDate().toString().padStart(2,'0')}`;
            
            const payload = { d: dHash, w: walletAddr, ed: expStr, tx: signature };
            // 使用安全的 Base64 編碼方式
            const b64 = btoa(unescape(encodeURIComponent(JSON.stringify({p: payload}))))
                        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
            const ir1 = "IR1." + b64;

            // 寫入 Google Form (No-CORS 模式)
            const formQuery = `?${ENTRIES.device}=${dHash}&${ENTRIES.wallet}=${walletAddr}&${ENTRIES.ir1}=${ir1}&${ENTRIES.tx}=${signature}&${ENTRIES.plan}=${encodeURIComponent(plan.name)}`;
            fetch(CONFIG.formUrl + formQuery, { mode: 'no-cors' });

            statusEl.innerHTML = `
                <div style="color:green; text-align:center;">
                    <h3>🎉 啟用成功！</h3>
                    <p>授權碼已生成：</p>
                    <code style="background:#eee; padding:5px; font-size:16px;">${ir1}</code>
                    <p style="font-size:12px; color:#666; margin-top:10px;">請截圖或等待軟體自動抓取</p>
                </div>
            `;

        } catch (err) {
            showError(err.message || err);
        }
    }
</script>
</body>
</html>
