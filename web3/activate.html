<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoRec 授權中心</title>
    <script src="https://unpkg.com/@solana/web3.js@1.87.0/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@0.3.8/lib/index.iife.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .plan-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .plan-card:hover { border-color: #007bff; background: #f0f7ff; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        #status { margin-bottom: 20px; padding: 15px; border-radius: 8px; background: #e9ecef; font-size: 14px; word-break: break-all; min-height: 40px; border-left: 5px solid #007bff; }
        code { background: #eee; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h2>軟體授權與續約</h2>
    <div id="status">正在檢查載入環境...</div>
    <div id="plans-container"></div>
</div>

<script>
    // --- 1. 核心配置 (請確認這些資訊正確) ---
    const SKR_MINT = "SKRbvo6Gf7GondiT3BbTfuRDPqLWei4j2Qy2NPGZhW3"; 
    const RECEIVER = "AWcif9F1t3hYZwyiAKz49ad3MT2H8MSKnURvCgui8e2b"; 
    const FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSe7qB7Vj7-tL-P2P3y77z2l90-F4F7v5Z-pQWp8_S5bQWp8/formResponse";

    // Google Form 欄位編號
    const ENTRIES = {
        device: "entry.318491871", 
        wallet: "entry.1235688536",
        ir1: "entry.766787688", 
        tx: "entry.465243642", 
        plan: "entry.1350643756"
    };

    const PLANS = [
        { name: "測試方案 A4", skr: 1, days: 30 },
        { name: "測試方案 B", skr: 2, days: 90 },
        { name: "1年保固", skr: 3000, days: 365 },
        { name: "4年延長保固", skr: 3000, days: 1460 },
        { name: "10年專業支援", skr: 10000, days: 3650 }
    ];

    // --- 2. 初始化畫面 ---
    window.onload = function() {
        const statusEl = document.getElementById('status');
        try {
            // 驗證庫是否成功載入
            if (typeof solanaWeb3 === 'undefined' || typeof splToken === 'undefined') {
                throw new Error("Solana 核心組件載入失敗，請檢查網路連線。");
            }

            const urlParams = new URLSearchParams(window.location.search);
            const deviceHash = urlParams.get('d') || "N/A";
            statusEl.innerText = `目前設備 ID: ${deviceHash}`;

            const container = document.getElementById('plans-container');
            PLANS.forEach(p => {
                const card = document.createElement('div');
                card.className = 'plan-card';
                card.innerHTML = `<b>${p.name}</b><br>價格: ${p.skr} SKR / 保固天數: ${p.days} 天`;
                card.onclick = () => handlePaymentProcess(p, deviceHash);
                container.appendChild(card);
            });
        } catch (e) {
            statusEl.innerText = "❌ 錯誤: " + e.message;
            statusEl.style.borderLeftColor = "red";
        }
    };

    // --- 3. 支付主流程 ---
    async function handlePaymentProcess(plan, dHash) {
        const statusEl = document.getElementById('status');
        try {
            statusEl.innerText = `正在請求錢包授權 (${plan.skr} SKR)...`;
            statusEl.style.color = "blue";

            // 執行真實轉帳
            const txId = await executeSkrTransfer(plan.skr);

            // 計算到期日
            const exp = new Date();
            exp.setDate(exp.getDate() + plan.days);
            const expStr = exp.getFullYear() + "/" + String(exp.getMonth() + 1).padStart(2, '0') + "/" + String(exp.getDate()).padStart(2, '0');

            // 產生 IR1 授權碼
            const walletAddr = (window.phantom?.solana || window.solflare || window.solana).publicKey.toString();
            const payload = { d: dHash, w: walletAddr, ed: expStr, tx: txId };
            const jsonStr = JSON.stringify({ p: payload });
            const ir1 = "IR1." + btoa(unescape(encodeURIComponent(jsonStr))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');

            // 提交至 Google Form
            const query = `${ENTRIES.device}=${dHash}&${ENTRIES.wallet}=${walletAddr}&${ENTRIES.ir1}=${ir1}&${ENTRIES.tx}=${txId}&${ENTRIES.plan}=${plan.name}`;
            fetch(`${FORM_ACTION}?${query}`, { mode: 'no-cors' });

            statusEl.style.color = "green";
            statusEl.innerHTML = `✅ 支付成功！<br>授權碼：<code>${ir1}</code><br>資料已同步雲端，請重新啟動軟體。`;
        } catch (err) {
            statusEl.style.color = "red";
            statusEl.innerText = "❌ 交易失敗: " + err.message;
        }
    }

    // --- 4. 區塊鏈轉帳邏輯 ---
    async function executeSkrTransfer(amount) {
        // 使用 Helius 穩定節點
        const rpcUrl = "https://mainnet.helius-rpc.com/?api-key=70163351-a9c1-426b-871d-f8a48b948700";
        const connection = new solanaWeb3.Connection(rpcUrl, "confirmed");
        
        // 偵測錢包
        const provider = window.phantom?.solana || window.solflare || window.solana;
        if (!provider) throw new Error("找不到相容錢包，請在錢包 App 內瀏覽器開啟。");

        // 連接錢包
        if (!provider.isConnected) await provider.connect();

        const fromPubkey = provider.publicKey;
        const toPubkey = new solanaWeb3.PublicKey(RECEIVER);
        const mintPubkey = new solanaWeb3.PublicKey(SKR_MINT);

        // 取得代幣小數位數
        const mintAccount = await connection.getParsedAccountInfo(mintPubkey);
        if (!mintAccount.value) throw new Error("無法取得代幣資訊。");
        const decimals = mintAccount.value.data.parsed.info.decimals;
        const adjustedAmount = amount * Math.pow(10, decimals);

        // 取得代幣帳戶 (ATA)
        const fromATA = await splToken.getAssociatedTokenAddress(mintPubkey, fromPubkey);
        const toATA = await splToken.getAssociatedTokenAddress(mintPubkey, toPubkey);

        // 建立轉帳交易
        const transaction = new solanaWeb3.Transaction().add(
            splToken.createTransferInstruction(fromATA, toATA, fromPubkey, adjustedAmount)
        );

        transaction.feePayer = fromPubkey;
        const { blockhash } = await connection.getLatestBlockhash();
        transaction.recentBlockhash = blockhash;

        // 簽署並傳送
        const { signature } = await provider.signAndSendTransaction(transaction);
        
        // 等待確認
        await connection.confirmTransaction(signature);
        return signature;
    }
</script>
</body>
</html>
