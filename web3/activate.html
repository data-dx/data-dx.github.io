<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoRec 授權中心 (SKR 支付)</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@0.3.8/lib/index.iife.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .plan-card { border: 1px solid #e0e0e0; padding: 20px; margin-bottom: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .plan-card:hover { border-color: #007bff; background: #f8f9ff; }
        h3 { margin: 0 0 10px 0; color: #007bff; }
        #status { margin-bottom: 20px; padding: 15px; border-radius: 8px; background: #fff3cd; color: #856404; font-size: 14px; word-break: break-all; border: 1px solid #ffeeba; }
        .footer { text-align: center; font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">InfoRec 軟體授權與續約</h2>
    <div id="status">正在初始化環境...</div>
    <div id="plans-container"></div>
    <div class="footer">請在 Solana 錢包內建瀏覽器開啟以獲得最佳體驗</div>
</div>

<script>
    // --- 核心配置 (已填入您的資訊) ---
    const SKR_MINT = "SKRbvo6Gf7GondiT3BbTfuRDPqLWei4j2Qy2NPGZhW3"; 
    const RECEIVER = "AWcif9F1t3hYZwyiAKz49ad3MT2H8MSKnURvCgui8e2b"; 
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSe7qB7Vj7-tL-P2P3y77z2l90-F4F7v5Z-pQWp8_S5bQWp8/formResponse";

    const ENTRIES = {
        device: "entry.318491871", wallet: "entry.1235688536",
        ir1: "entry.766787688", tx: "entry.465243642", plan: "entry.1350643756"
    };

    const PLANS = [
        { name: "測試方案 A2", skr: 1, days: 30 },
        { name: "測試方案 B", skr: 2, days: 90 },
        { name: "1年保固", skr: 3000, days: 365 },
        { name: "4年延長保固", skr: 3000, days: 1460 },
        { name: "10年專業支援", skr: 10000, days: 3650 }
    ];

    const urlParams = new URLSearchParams(window.location.search);
    const deviceHash = urlParams.get('d') || "N/A";

    /** {功能：執行真實 SKR 轉帳} */
/** {功能：執行真實 SKR 轉帳，並解決 RPC 403 報錯問題} */
/** {功能：執行真實 SKR 轉帳，採用 Helius 穩定節點並解決 403 報錯} */
async function transferSKR(amount) {
    // 1. 建立連線：使用 Helius 提供的高穩定度節點，確保不被 403 阻擋
    const RPC_ENDPOINT = "https://mainnet.helius-rpc.com/?api-key=70163351-a9c1-426b-871d-f8a48b948700";
    
    const connection = new solanaWeb3.Connection(RPC_ENDPOINT, {
        commitment: "confirmed",
        confirmTransactionInitialTimeout: 60000
    });

    try {
        // 2. 偵測並連接錢包 (支援 Phantom, Solflare 等多種錢包)
        const provider = window.phantom?.solana || window.solflare || window.solana;
        if (!provider) throw new Error("找不到相容錢包，請在錢包 App 內建瀏覽器中開啟此網頁");

        if (!provider.isConnected) {
            await provider.connect();
        }

        const fromPubkey = provider.publicKey;
        const toPubkey = new solanaWeb3.PublicKey(RECEIVER);
        const mintPubkey = new solanaWeb3.PublicKey(SKR_MINT);

        // 3. 獲取代幣精確度 (Decimals)
        const mintInfo = await connection.getParsedAccountInfo(mintPubkey);
        if (!mintInfo || !mintInfo.value) throw new Error("無法獲取 SKR 代幣資訊，請確認 Mint 地址");
        
        const decimals = mintInfo.value.data.parsed.info.decimals;
        const adjustedAmount = amount * Math.pow(10, decimals);

        // 4. 取得傳送者與接收者的代幣帳戶 (ATA)
        const fromTokenAccount = await splToken.getAssociatedTokenAddress(mintPubkey, fromPubkey);
        const toTokenAccount = await splToken.getAssociatedTokenAddress(mintPubkey, toPubkey);

        // 5. 建立轉帳交易指令
        const transaction = new solanaWeb3.Transaction().add(
            splToken.createTransferInstruction(
                fromTokenAccount, 
                toTokenAccount, 
                fromPubkey, 
                adjustedAmount
            )
        );

        transaction.feePayer = fromPubkey;
        const { blockhash } = await connection.getLatestBlockhash();
        transaction.recentBlockhash = blockhash;

        // 6. 請求錢包簽署並送出交易
        const { signature } = await provider.signAndSendTransaction(transaction);
        
        // 7. 等待區塊鏈確認結果
        await connection.confirmTransaction(signature);
        return signature;

    } catch (err) {
        // 捕捉並拋出更友善的錯誤訊息
        console.error("支付程序錯誤:", err);
        throw new Error(err.message || "交易失敗，請確認錢包餘額是否充足");
    }
}

    transaction.feePayer = fromPubkey;
    const { blockhash } = await connection.getLatestBlockhash();
    transaction.recentBlockhash = blockhash;

    // 6. 簽署並送出
    const { signature } = await provider.signAndSendTransaction(transaction);
    await connection.confirmTransaction(signature);
    return signature;
}
    /** {功能：處理支付點擊事件} */
    async function handlePay(plan) {
        const statusEl = document.getElementById('status');
        try {
            statusEl.style.color = "blue";
            statusEl.innerText = `正在請錢包授權支付 ${plan.skr} SKR...`;
            
            const txId = await transferSKR(plan.skr); // 執行真實扣款

            // 計算到期日
            const exp = new Date();
            exp.setDate(exp.getDate() + plan.days);
            const expStr = exp.getFullYear() + "/" + String(exp.getMonth()+1).padStart(2,'0') + "/" + String(exp.getDate()).padStart(2,'0');

            // 產生 IR1 代碼 (簡易版 HMAC)
            const payload = { d: deviceHash, w: (window.solana || window.solflare).publicKey.toString(), ed: expStr, tx: txId };
            const ir1 = "IR1." + btoa(JSON.stringify({p: payload})).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');

            // 存入 Google Form
            const query = `${ENTRIES.device}=${deviceHash}&${ENTRIES.wallet}=${payload.w}&${ENTRIES.ir1}=${ir1}&${ENTRIES.tx}=${txId}&${ENTRIES.plan}=${plan.name}`;
            fetch(`${FORM_URL}?${query}`, { mode: 'no-cors' });

            statusEl.style.color = "green";
            statusEl.innerHTML = `✅ 支付成功！<br>TxID: ${txId.substring(0,10)}...<br>授權碼：<code>${ir1}</code>`;
        } catch (err) {
            statusEl.style.color = "red";
            statusEl.innerText = "❌ 失敗: " + err.message;
        }
    }

    window.onload = () => {
        document.getElementById('status').innerText = `目前設備 ID: ${deviceHash}`;
        const container = document.getElementById('plans-container');
        PLANS.forEach(p => {
            const card = document.createElement('div');
            card.className = 'plan-card';
            card.innerHTML = `<h3>${p.name}</h3><p>支付金額: <b>${p.skr} SKR</b><br>保固期限: <b>${p.days} 天</b></p>`;
            card.onclick = () => handlePay(p);
            container.appendChild(card);
        });
    };
</script>
</body>
</html>
