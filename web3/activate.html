<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoRec 授權中心 | 2026 多重保障版</title>

    <style>
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f0f4f8; padding: 20px; color: #2c3e50; }
        .container { max-width: 480px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .status-card { padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; border-left: 6px solid #3498db; background: #ebf5fb; }
        .plan-box { border: 2px solid #ecf0f1; padding: 18px; margin-bottom: 12px; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .plan-box:hover { border-color: #3498db; background: #f4faff; transform: translateY(-2px); }
        code { background: #f4f4f4; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        #error-log { color: #e74c3c; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>軟體授權啟用</h2>
    <div id="status" class="status-card">正在連線至區塊鏈組件...</div>
    <div id="error-log"></div>
    <div id="plans-container"></div>
</div>

<script>
    // --- 2026 最新穩定資源列表 (三重備援) ---
    const LIBRARIES = {
        web3: [
            "https://cdn.jsdelivr.net/npm/@solana/web3.js@1.98.4/lib/index.iife.min.js",
            "https://unpkg.com/@solana/web3.js@1.98.4/lib/index.iife.min.js",
            "https://cdnjs.cloudflare.com/ajax/libs/solana-web3.js/1.98.4/index.iife.min.js"
        ],
        token: [
            "https://cdn.jsdelivr.net/npm/@solana/spl-token@0.4.14/lib/index.iife.min.js",
            "https://unpkg.com/@solana/spl-token@0.4.14/lib/index.iife.min.js"
        ]
    };

    // --- 動態載入函式 ---
    async function loadScript(urls) {
        for (let url of urls) {
            try {
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = url;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
                console.log(`成功載入資源: ${url}`);
                return true;
            } catch (e) {
                console.warn(`載入失敗: ${url}，嘗試備援線路...`);
            }
        }
        return false;
    }

    // --- 初始化流程 ---
    window.onload = async function() {
        const statusEl = document.getElementById('status');
        const errLog = document.getElementById('error-log');

        // 嘗試載入所有核心組件
        const web3Ok = await loadScript(LIBRARIES.web3);
        const tokenOk = await loadScript(LIBRARIES.token);

        if (!web3Ok || !tokenOk) {
            statusEl.innerHTML = "<b style='color:red'>❌ 組件載入失敗</b>";
            errLog.style.display = "block";
            errLog.innerText = "您的伺服器 (inforec.dev) 的防火牆或 CSP 設定阻擋了外部 JS 載入。建議將 JS 下載後放在伺服器本地路徑。";
            return;
        }

        const dId = new URLSearchParams(window.location.search).get('d') || "N/A";
        statusEl.innerHTML = `✅ 系統就緒 (v2026)<br>設備 ID: <code>${dId}</code>`;

        renderPlans(dId);
    };

    function renderPlans(dId) {
        const plans = [
            { t: "測試方案 A", a: 1, d: 30 },
            { t: "測試方案 B", a: 2, d: 90 },
            { t: "1年保固授權", a: 3000, d: 365 }
        ];
        const container = document.getElementById('plans-container');
        plans.forEach(p => {
            const div = document.createElement('div');
            div.className = 'plan-box';
            div.innerHTML = `<div><b>${p.t}</b><br><small>${p.d} 天</small></div><div style="color:#3498db;font-weight:800;">${p.a} SKR</div>`;
            div.onclick = () => handlePay(p, dId);
            container.appendChild(div);
        });
    }

    async function handlePay(p, dId) {
        const statusEl = document.getElementById('status');
        try {
            statusEl.innerText = "正在喚起錢包...";
            const provider = window.phantom?.solana || window.solflare || window.solana;
            if (!provider) throw new Error("找不到錢包，請在錢包 APP 內開啟");

            await provider.connect();
            const connection = new solanaWeb3.Connection("https://mainnet.helius-rpc.com/?api-key=70163351-a9c1-426b-871d-f8a48b948700");

            const mintPk = new solanaWeb3.PublicKey("SKRbvo6Gf7GondiT3BbTfuRDPqLWei4j2Qy2NPGZhW3");
            const fromATA = await splToken.getAssociatedTokenAddress(mintPk, provider.publicKey);
            const toATA = await splToken.getAssociatedTokenAddress(mintPk, new solanaWeb3.PublicKey("AWcif9F1t3hYZwyiAKz49ad3MT2H8MSKnURvCgui8e2b"));

            const tx = new solanaWeb3.Transaction().add(
                splToken.createTransferInstruction(fromATA, toATA, provider.publicKey, p.a * 1000000000)
            );

            tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
            tx.feePayer = provider.publicKey;

            const { signature } = await provider.signAndSendTransaction(tx);
            statusEl.innerText = "交易確認中...";
            await connection.confirmTransaction(signature);

            // 成功產碼邏輯 (同前次)
            statusEl.innerHTML = `<b style="color:green">✅ 支付成功！</b>`;
        } catch (e) {
            statusEl.innerHTML = `<b style="color:red">❌ 錯誤：</b>${e.message}`;
        }
    }
</script>
</body>
</html>
